server {
    listen 80;
    server_name tokyoclaw.metast.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tokyoclaw.metast.cn;

    ssl_certificate     /etc/nginx/ssl/vxlink/vxlink.crt;
    ssl_certificate_key /etc/nginx/ssl/vxlink/vxlink.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 2m;

    location /wecom/callback {
        proxy_pass http://127.0.0.1:9050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /wecom-health {
        proxy_pass http://127.0.0.1:9050/health;
        proxy_http_version 1.1;
    }
}
